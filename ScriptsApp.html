  =========================================================================

  Administra el motor de estados. Implementa la carga diferida condicional 
  para interceptar el auto-login resguardando las claves por rol.
-->
<script>
  (function() {
    console.log("[SISTEMA MÁSTER] Inicializando orquestador reactivo de permisos...");

    const fechaAyer = new Date();
    fechaAyer.setDate(fechaAyer.getDate() - 1);
    const fechaAyerStr = fechaAyer.toISOString().split('T')[0];

    const MAPA_PESTANAS = {
      "Mis Atenciones": "Borrador",
      "Mi Historial": "OATC",
      "Mi Agenda": "Registro Citas",
      "Mis Clientes": "Clientes",
      "Mis Indicadores": "OATC",
      "Mi Perfil": "Agentes",
      "Botonera": "Borrador",
      "Horario": "Agentes"
    };

    // 1. Estructuración del Almacén Máster en window
    window.AppStore = {
      pestanaActiva: Vue.ref('Borrador'), // Será gobernada dinámicamente por la vista inyectada
      cargando: Vue.ref(false),
      procesandoAlerta: Vue.ref(false),
      
      agente: Vue.ref({
        filaOriginal: null,
        sede: '',
        nombre: '',
        nickname: '',
        especialidad: '', // Campo pivote del enrutador de Index.html
        autenticado: false
      }),
      
      loginForm: Vue.ref({ nickname: '', pin: '', sede: 'RD' }),
      listaNicknamesDisponibles: Vue.ref([]),
      cacheDatos: Vue.ref({ "Borrador": [], "OATC": [], "Agentes": [], "Clientes": [], "Registro Citas": [] }),
      cacheEncabezados: Vue.ref({ "Borrador": [], "OATC": [], "Agentes": [], "Clientes": [], "Registro Citas": [] }),
      filtroFechaInicio: Vue.ref(fechaAyerStr),
      filtroFechaFin: Vue.ref(fechaAyerStr),
      filtroBusquedaCliente: Vue.ref(''), // Búsqueda de Mis Clientes
      
      // NUEVO: Sistema Toast y Tema
      toasts: Vue.ref([]),
      tema: Vue.ref(localStorage.getItem('workerview_theme') || 'oscuro'),
      
      // UX Modal Detalles
      modalDetalles: Vue.ref({ visible: false, card: null, origen: '' }),
      modalHistorialAtenciones: Vue.ref({ visible: false, clienteNombre: '', registros: [] }),
      modalCola: Vue.ref(false),
      filtroCola: Vue.ref('Todos'), // 'Todos', 'Estilismo', 'Cosmiatría'
      toast: Vue.ref({ visible: false, mensaje: '', tipo: 'success' }),
      
      // Control de Jefe Operativo
      toggleInicioJefe: Vue.ref('Mando'), // 'Mando', 'Botonera', 'Bar'
      toggleIndicadoresJefe: Vue.ref('Sede'), // 'Sede' o 'Mi Rendimiento'
      toggleMandoTab: Vue.ref('Cola'), // 'Cola' o 'EnCurso'
      agenteSeleccionadoSede: Vue.ref('Todos'), // Para el módulo 4
      limiteResultados: Vue.ref(50), // Límite de tarjetas por pestaña
      
      // UX Diálogo Universal Tailwind (Confirm/Prompt)
      dialogo: Vue.ref({ 
        visible: false, 
        titulo: '', 
        mensaje: '', 
        tipo: 'confirm', // 'confirm' o 'prompt'
        inputPlaceholder: '',
        inputVal: '', 
        onConfirm: null,
        botonAuxiliar: null,
        onBotonAuxiliar: null,
        mostrarSelectorClientes: false
      }),

      // UX Modal Formulario Genérico
      modalFormulario: Vue.ref({
        visible: false,
        titulo: '',
        campos: [], // ej: [{ id: 'nombre', label: 'Nombre', tipo: 'text', valor: '' }]
        textoBoton: 'Guardar',
        onSubmit: null
      }),

      // UX Menú Burbujas
      mostrarMenuBurbujas: Vue.ref(false),

      // UX Edición de Perfil
      modoEdicionPerfil: Vue.ref(false),
      perfilForm: Vue.ref({
        nickname: '',
        pin: '',
        diaDescanso: ''
      })
    };

    const app = Vue.createApp({
      setup() {

        /**
         * Enrutador de Caché e I/O Atómico.
         */
        const mostrarToast = (mensaje, tipo = 'info') => {
          const id = Date.now();
          window.AppStore.toasts.value.push({ id, mensaje, tipo });
          setTimeout(() => {
            window.AppStore.toasts.value = window.AppStore.toasts.value.filter(t => t.id !== id);
          }, 4000);
        };

        const alternarTema = () => {
          window.AppStore.tema.value = window.AppStore.tema.value === 'oscuro' ? 'claro' : 'oscuro';
          localStorage.setItem('workerview_theme', window.AppStore.tema.value);
          aplicarTemaAlHTML();
        };

        const aplicarTemaAlHTML = () => {
          if (window.AppStore.tema.value === 'oscuro') {
            document.documentElement.classList.add('dark');
          } else {
            document.documentElement.classList.remove('dark');
          }
        };

        const abrirModalDetalles = (cardData) => {
          window.AppStore.modalDetalles.value = { visible: true, card: cardData, origen: window.AppStore.pestanaActiva.value };
        };

        const cerrarModalDetalles = () => {
          window.AppStore.modalDetalles.value.visible = false;
          setTimeout(() => { window.AppStore.modalDetalles.value.card = null; }, 300); // Dar tiempo a la animación
        };

        const mostrarDialogo = (config) => {
          window.AppStore.dialogo.value = {
            visible: true,
            titulo: config.titulo || 'Atención',
            mensaje: config.mensaje || '',
            tipo: config.tipo || 'confirm',
            inputPlaceholder: config.inputPlaceholder || '',
            inputVal: '',
            onConfirm: config.onConfirm || null,
            botonAuxiliar: config.botonAuxiliar || null,
            onBotonAuxiliar: config.onBotonAuxiliar || null,
            mostrarSelectorClientes: config.mostrarSelectorClientes || false
          };
        };

        const cerrarDialogo = () => {
          window.AppStore.dialogo.value.visible = false;
        };

        const confirmarDialogo = () => {
          const state = window.AppStore.dialogo.value;
          if (state.onConfirm) {
            state.onConfirm(state.tipo === 'prompt' ? state.inputVal : null);
          }
          cerrarDialogo();
        };

        const mostrarModalFormulario = (config) => {
          const camposMapeados = (config.campos || []).map(c => ({ ...c, valor: '' }));
          window.AppStore.modalFormulario.value = {
            visible: true,
            titulo: config.titulo || 'Formulario',
            campos: camposMapeados,
            textoBoton: config.textoBoton || 'Guardar',
            onSubmit: config.onSubmit || null
          };
        };

        const cerrarModalFormulario = () => {
          window.AppStore.modalFormulario.value.visible = false;
        };

        const enviarModalFormulario = () => {
          const state = window.AppStore.modalFormulario.value;
          if (state.onSubmit) {
            // Extraer valores en un objeto { idCampo: valor }
            const payload = {};
            state.campos.forEach(c => payload[c.id] = c.valor);
            state.onSubmit(payload);
          }
          cerrarModalFormulario();
        };

        const seleccionarClienteDialogo = (clienteRaw) => {
          // Formato: Nombre Apellido | DNI | Celular
          const nombre = clienteRaw[1] ? String(clienteRaw[1]).trim() : '';
          const apellido = clienteRaw[2] ? String(clienteRaw[2]).trim() : '';
          const dni = clienteRaw[3] ? String(clienteRaw[3]).trim() : '';
          const cel = clienteRaw[5] ? String(clienteRaw[5]).trim() : '';
          
          let format = `${nombre} ${apellido}`.trim();
          if (dni) format += ` | ${dni}`;
          if (cel) format += ` | ${cel}`;
          
          window.AppStore.dialogo.value.inputVal = format;
          window.AppStore.dialogo.value.mostrarSelectorClientes = false;
        };



        const solicitarMatrizAlServidor = (nombreHojaReal) => {
          const sede = window.AppStore.agente.value.sede;
          window.AppStore.cargando.value = true;

          google.script.run
            .withSuccessHandler((resultadoRaw) => {
              window.AppStore.cargando.value = false;
              if (resultadoRaw && resultadoRaw.exito && resultadoRaw.matriz.length > 0) {
                window.AppStore.cacheEncabezados.value[nombreHojaReal] = resultadoRaw.matriz[0];
                window.AppStore.cacheDatos.value[nombreHojaReal] = resultadoRaw.matriz.slice(1);
              }
            })
            .withFailureHandler((err) => { window.AppStore.cargando.value = false; })
            .obtenerMatrizPestanaPolimorfica(sede, nombreHojaReal);
        };

        const dispararAlertaBotonera = (tipoAlerta) => {
          if (window.AppStore.procesandoAlerta.value) return Promise.reject("Ya procesando");
          window.AppStore.procesandoAlerta.value = true;

          return new Promise((resolve, reject) => {
            google.script.run
              .withSuccessHandler(() => {
                window.AppStore.procesandoAlerta.value = false;
                mostrarToast("🚨 Alerta '" + tipoAlerta + "' registrada con éxito.", "success");
                resolve();
              })
              .withFailureHandler((err) => { 
                window.AppStore.procesandoAlerta.value = false;
                mostrarToast("⚠️ Error al registrar alerta: " + (err.message || err), "error");
                reject(err);
              })
              .registrarAlertaBotonera(window.AppStore.agente.value.nombre, tipoAlerta, window.AppStore.agente.value.sede);
          });
        };

        const cargarNicknamesSede = () => {
          const sedeSeleccionada = window.AppStore.loginForm.value.sede || "RD";
          window.AppStore.loginForm.value.nickname = "";
          window.AppStore.listaNicknamesDisponibles.value = [];

          google.script.run
            .withSuccessHandler((res) => { window.AppStore.listaNicknamesDisponibles.value = res || []; })
            .obtenerNicknamesPorSede(sedeSeleccionada);
        };

        const ejecutarLogin = () => {
          const form = window.AppStore.loginForm.value;
          if (!form.nickname || !form.pin) return mostrarToast("Completa los campos.", "error");

          window.AppStore.cargando.value = true;

          google.script.run
            .withSuccessHandler((res) => {
              window.AppStore.cargando.value = false;
              if (res && res.exito) {
                res.autenticado = true;
                window.AppStore.agente.value = res;
                localStorage.setItem('workerview_session', JSON.stringify(res));
                
                // Inicializador dinámico de pestaña de arranque y filtro de cola según especialidad
                if (res.especialidad === 'Estilismo' || res.especialidad === 'Cosmiatría') {
                  window.AppStore.filtroCola.value = res.especialidad;
                  cambiarPestana('Botonera');
                } else if (res.especialidad === 'Jefe Operativo') {
                  window.AppStore.filtroCola.value = 'Todos';
                  cambiarPestana('Botonera');
                } else {
                  window.AppStore.filtroCola.value = 'Todos';
                  cambiarPestana('Borrador'); // Arranque estándar por tabla para Admin
                }
              } else {
                mostrarToast(res.mensaje || "PIN incorrecto.", "error");
              }
            })
            .withFailureHandler((err) => { 
              window.AppStore.cargando.value = false; 
              mostrarToast("Error de conexión: " + (err.message || err), "error");
            })
            .loginAgente(form.nickname, form.pin, form.sede);
        };

        const cerrarSesion = () => {
          localStorage.removeItem('workerview_session');
          window.AppStore.agente.value = { filaOriginal: null, sede: '', nombre: '', nickname: '', especialidad: '', autenticado: false };
          window.AppStore.cacheDatos.value = { "Borrador": [], "OATC": [], "Agentes": [], "Clientes": [], "Registro Citas": [] };
          window.AppStore.cacheEncabezados.value = { "Borrador": [], "OATC": [], "Agentes": [], "Clientes": [], "Registro Citas": [] };
          window.AppStore.modoEdicionPerfil.value = false;
          cargarNicknamesSede();
        };

        const iniciarEdicionPerfil = () => {
          window.AppStore.perfilForm.value = {
            nickname: window.AppStore.agente.value.nickname,
            pin: window.AppStore.agente.value.pin,
            diaDescanso: window.AppStore.agente.value.diaDescanso,
            celular: window.AppStore.agente.value.celular,
            dni: window.AppStore.agente.value.dni,
            cumpleanos: window.AppStore.agente.value.cumpleanos,
            genero: window.AppStore.agente.value.genero
          };
          window.AppStore.modoEdicionPerfil.value = true;
        };

        const guardarPerfil = () => {
          const form = window.AppStore.perfilForm.value;
          if (!form.nickname || !form.pin) return mostrarToast("Nickname y PIN son obligatorios.", "error");
          
          window.AppStore.cargando.value = true;
          
          google.script.run
            .withSuccessHandler((res) => {
              window.AppStore.cargando.value = false;
              if (res && res.exito) {
                mostrarToast("Perfil actualizado correctamente", "success");
                window.AppStore.agente.value.nickname = form.nickname;
                window.AppStore.agente.value.pin = form.pin;
                window.AppStore.agente.value.diaDescanso = form.diaDescanso;
                window.AppStore.agente.value.celular = form.celular;
                window.AppStore.agente.value.dni = form.dni;
                window.AppStore.agente.value.cumpleanos = form.cumpleanos;
                window.AppStore.agente.value.genero = form.genero;
                
                localStorage.setItem('workerview_session', JSON.stringify(window.AppStore.agente.value));
                window.AppStore.modoEdicionPerfil.value = false;
              } else {
                mostrarToast(res.mensaje || "Error al actualizar perfil.", "error");
              }
            })
            .withFailureHandler((err) => {
              window.AppStore.cargando.value = false;
              mostrarToast("Fallo de red: " + (err.message || err), "error");
            })
            .actualizarPerfil(window.AppStore.agente.value.sede, window.AppStore.agente.value.filaOriginal, form);
        };

        const esMiRegistro = (celdaTexto, miNick, miNombre) => {
          const txt = String(celdaTexto || '').toLowerCase().trim();
          const n = String(miNick || '').toLowerCase().trim();
          const nc = String(miNombre || '').toLowerCase().trim();
          
          if (txt === n || txt === nc) return true;
          
          const regexNick = new RegExp(`\\b${n}\\b`);
          const regexNombre = new RegExp(`\\b${nc}\\b`);
          return regexNick.test(txt) || regexNombre.test(txt);
        };

        const cambiarPestana = (nuevaPestana) => {
          window.AppStore.pestanaActiva.value = nuevaPestana;
          window.AppStore.limiteResultados.value = 50; // Reiniciar límite al cambiar de pestaña
          if (nuevaPestana === 'Botonera') return;

          let hojaReal = MAPA_PESTANAS[nuevaPestana] || nuevaPestana;

          const dataExistente = window.AppStore.cacheDatos.value[hojaReal];
          if (!dataExistente || dataExistente.length === 0) {
            solicitarMatrizAlServidor(hojaReal);
          }

          // Inyección especial: Para Jefe Operativo en Indicadores, necesitamos la matriz Agentes para poblar su Dropdown
          if (nuevaPestana === 'Mis Indicadores' && window.AppStore.agente.value.especialidad === 'Jefe Operativo') {
             if (window.AppStore.cacheDatos.value['Agentes'].length === 0) {
                solicitarMatrizAlServidor('Agentes');
             }
          }
        };

        const cargarMasResultados = () => {
          window.AppStore.limiteResultados.value += 50;
        };

        const forzarRefrescoDatos = () => {
          const tab = window.AppStore.pestanaActiva.value;
          let hojaReal = MAPA_PESTANAS[tab] || tab;
          window.AppStore.cacheDatos.value[hojaReal] = [];
          solicitarMatrizAlServidor(hojaReal);
          
          if (tab === 'Mis Clientes') {
             window.AppStore.cacheDatos.value['OATC'] = [];
             solicitarMatrizAlServidor('OATC');
          }
          if (tab === 'Mis Indicadores') {
             window.AppStore.cacheDatos.value['Borrador'] = [];
             window.AppStore.cacheDatos.value['Clientes'] = [];
             solicitarMatrizAlServidor('Borrador');
             solicitarMatrizAlServidor('Clientes');
             
             if (window.AppStore.agente.value.especialidad === 'Jefe Operativo') {
               window.AppStore.cacheDatos.value['Agentes'] = [];
               solicitarMatrizAlServidor('Agentes');
             }
          }
        };

        const parseDateRobust = (val) => {
          if (!val) return NaN;
          if (val instanceof Date) return val.getTime();
          if (typeof val === 'number') return val; // Podría ser un número serial, pero lo tratamos como ms o lo ignoramos
          
          const str = String(val).trim();
          
          // Si es ISO (generado por Consultas.js)
          if (str.includes('T') && (str.endsWith('Z') || str.includes('+') || str.includes('-'))) {
            const d = new Date(str);
            if (!isNaN(d.getTime())) return d.getTime();
          }

          // Formato DD/MM/YYYY, DD-MM-YYYY, DD.MM.YYYY
          const matchES = str.match(/^(\d{1,2})[/\-.](\d{1,2})[/\-.](\d{4})/);
          if (matchES) {
            const day = parseInt(matchES[1], 10);
            const month = parseInt(matchES[2], 10) - 1;
            const year = parseInt(matchES[3], 10);
            
            const timeMatch = str.match(/(\d{1,2}):(\d{1,2})(?::(\d{1,2}))?/);
            let hours = 0, mins = 0, secs = 0;
            if (timeMatch) {
              hours = parseInt(timeMatch[1], 10);
              mins = parseInt(timeMatch[2], 10);
              secs = timeMatch[3] ? parseInt(timeMatch[3], 10) : 0;
              if (str.toLowerCase().includes('pm') && hours < 12) hours += 12;
              if (str.toLowerCase().includes('am') && hours === 12) hours = 0;
            }
            return new Date(year, month, day, hours, mins, secs).getTime();
          }

          // Formato YYYY/MM/DD, YYYY-MM-DD
          const matchEN = str.match(/^(\d{4})[/\-.](\d{1,2})[/\-.](\d{1,2})/);
          if (matchEN) {
            const year = parseInt(matchEN[1], 10);
            const month = parseInt(matchEN[2], 10) - 1;
            const day = parseInt(matchEN[3], 10);
            
            const timeMatch = str.match(/(\d{1,2}):(\d{1,2})(?::(\d{1,2}))?/);
            let hours = 0, mins = 0, secs = 0;
            if (timeMatch) {
              hours = parseInt(timeMatch[1], 10);
              mins = parseInt(timeMatch[2], 10);
              secs = timeMatch[3] ? parseInt(timeMatch[3], 10) : 0;
              if (str.toLowerCase().includes('pm') && hours < 12) hours += 12;
              if (str.toLowerCase().includes('am') && hours === 12) hours = 0;
            }
            return new Date(year, month, day, hours, mins, secs).getTime();
          }

          // Formato Solo Hora (ej. 11:33 AM, 12:48 PM)
          const matchSoloHora = str.match(/^(\d{1,2}):(\d{1,2})(?::(\d{1,2}))?\s*(am|pm)?/i);
          if (matchSoloHora && !matchES && !matchEN) {
            let hours = parseInt(matchSoloHora[1], 10);
            let mins = parseInt(matchSoloHora[2], 10);
            let secs = matchSoloHora[3] ? parseInt(matchSoloHora[3], 10) : 0;
            const ampm = matchSoloHora[4] ? matchSoloHora[4].toLowerCase() : '';
            if (ampm === 'pm' && hours < 12) hours += 12;
            if (ampm === 'am' && hours === 12) hours = 0;
            
            // Asumimos el día de hoy
            const hoy = new Date();
            return new Date(hoy.getFullYear(), hoy.getMonth(), hoy.getDate(), hours, mins, secs).getTime();
          }

          // Fallback final - Safari compatibility
          let safeStr = str;
          if (/^\d{4}-\d{2}-\d{2}\s\d{2}:\d{2}:\d{2}/.test(safeStr)) {
            safeStr = safeStr.replace(' ', 'T');
          }
          const finalTime = new Date(safeStr).getTime();
          return isNaN(finalTime) ? NaN : finalTime;
        };

        const formatearFechaUHoraVisual = (val, h) => {
          if (!val) return "---";
          const ms = parseDateRobust(val);
          if (isNaN(ms)) return String(val).trim();
          
          const d = new Date(ms);
          if (h) {
            let hrs = d.getHours();
            const mins = String(d.getMinutes()).padStart(2, '0');
            const ampm = hrs >= 12 ? 'PM' : 'AM';
            hrs = hrs % 12 || 12;
            return `${hrs}:${mins} ${ampm}`;
          } else {
            return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`;
          }
        };

        const obtenerClaseEstadoCSS = (txt) => {
          if (!txt) return "bg-slate-900 text-slate-400 border-slate-800";
          const n = String(txt).toLowerCase();
          if (n.includes("pendiente")) return "bg-amber-500/10 text-amber-400 border-amber-500/20";
          if (n.includes("finalizado") || n.includes("terminado")) return "bg-emerald-500/10 text-emerald-400 border-emerald-500/20";
          if (n.includes("cancelado")) return "bg-rose-500/10 text-rose-400 border-rose-500/20";
          return "bg-indigo-500/10 text-indigo-400 border-indigo-500/20";
        };

        Vue.onMounted(() => {
          aplicarTemaAlHTML(); // Aplicar tema al iniciar
          const sesion = localStorage.getItem('workerview_session');
          if (sesion) {
            window.AppStore.agente.value = JSON.parse(sesion);
            window.AppStore.agente.value.autenticado = true;
            cambiarPestana(window.AppStore.agente.value.especialidad === 'Estilismo' || window.AppStore.agente.value.especialidad === 'Cosmiatría' ? 'Botonera' : 'Borrador');
          } else {
            cargarNicknamesSede();
          }
        });

        const obtenerEncabezadosTabla = Vue.computed(() => {
          const t = window.AppStore.pestanaActiva.value;
          let h = MAPA_PESTANAS[t] || t;
          return window.AppStore.cacheEncabezados.value[h] || [];
        });

        // =========================================================================
        // INYECCIÓN DE CONTROLADORES SANITIZADOS DENTRO DEL SETUP() DE VUE 3
        // =========================================================================

        // 1. Instanciación del estado reactivo del Bar en el Almacén Global
        AppStore.pedidoBar = Vue.reactive({
          cafe: 0,
          infusion: 0,
          tipoInfusion: 'Manzanilla',
          bebidaDia: 0,
          agua: 0
        });

        // 2. Método Mutador Seguro (Garantiza mínimos de cero en RAM)
        const modificarCantidadBar = (bebida, operacion) => {
          if (operacion === 'sumar') {
            AppStore.pedidoBar[bebida]++;
          } else if (operacion === 'restar' && AppStore.pedidoBar[bebida] > 0) {
            AppStore.pedidoBar[bebida]--;
          }
        };

        // 3. Propiedad Computada: Filtro de Fin de semana (Viernes = 5, Sábado = 6)
        const esFinDeSemanaEfectivo = Vue.computed(() => {
          const dia = new Date().getDay();
          return (dia === 5 || dia === 6);
        });

        // 4. Propiedad Computada: Validador de Visibilidad del Botón de Envío
        const tieneItemsParaEnviar = Vue.computed(() => {
          const p = AppStore.pedidoBar;
          return (p.cafe + p.infusion + p.bebidaDia + p.agua) > 0;
        });

        // 5. Orquestador de Serialización Batch e Invocación Unificada de Red
        const enviarPedidoBarConsolidado = () => {
          const partes = [];
          const p = AppStore.pedidoBar;

          if (p.cafe > 0) partes.push(`${p.cafe} Café(s)`);
          if (p.infusion > 0) partes.push(`${p.infusion} Infusión(es) de ${p.tipoInfusion}`);
          if (p.bebidaDia > 0) partes.push(`${p.bebidaDia} Bebida(s) del Día`);
          if (p.agua > 0) partes.push(`${p.agua} Agua(s)`);

          const stringFinal = 'Bar: ' + partes.join(', ');

          // Invoca la función existente de red con bloqueo anti-doble clic

        const limpiarFiltroFechas = () => {

        const clientesAgente = Vue.computed(() => {

          if (especialidad === 'Jefe Operativo') {

          }
          
          // 1. Extraer identificadores de bloque estricto del historial del agente actual
          const identificadoresAgente = new Set();

        const obtenerDatosVisualizables = Vue.computed(() => {
          const t = window.AppStore.pestanaActiva.value;

          // Asignación de pestaña y columna base de Agente
          if (t === "Mis Atenciones") { h = "Borrador"; idx = 19; } // Col T
          else if (t === "Mi Historial") { h = "OATC"; idx = 6; }   // Col G
          else if (t === "Mi Agenda") { h = "Registro Citas"; idx = 5; } // Col F
          else if (t === "Mi Perfil") { h = "Agentes"; idx = 13; }
          else if (t === "Mis Clientes") { h = "Clientes"; idx = -2; } // No filtra por agente, busca globalmente
          else { h = t; idx = -1; }

          const m = window.AppStore.cacheDatos.value[h] || [];
          if (m.length === 0) return [];

          let filtered = m;
          const nombreCompleto = window.AppStore.agente.value.nombre.toLowerCase().trim();

          // Paso A y B: Filtros de Pertenencia y Sede
          if (t === "Mis Atenciones") {
            // Mapeo Complejo: Extraer el Stack (Apilamiento) de Atenciones en Curso para este Agente
            filtered = m.filter(row => {
              if (!row[13]) return false; // Debe ser OATC (tener hora de orden en Col N)
              
              const asignado = row[19]; // Col T (Agente OATC)
              if (!esMiRegistro(asignado, nick, nombreCompleto)) return false;
              
              const resolucion = String(row[20] || '').toLowerCase().trim(); // Col U (Hora Resol.)
              // Considerar activo si no dice cancelado, terminado, ni tiene una hora guardada (resolución)
              if (resolucion.includes('cancelado') || resolucion.includes('terminado') || resolucion.match(/\d{1,2}:\d{2}/)) {
                 return false;
              }
              return true;
            });
            // Ordenar por hora de creación (Col N), asumiendo más antiguo primero
            return filtered.sort((a, b) => parseDateRobust(a[13]) - parseDateRobust(b[13]));
          } else if (t === "Mi Historial") {
            filtered = filtered.filter(row => esMiRegistro(row[6], nick, nombreCompleto));
          } else if (t === "Mi Agenda") {
            filtered = filtered.filter(row => esMiRegistro(row[5], nick, nombreCompleto));
          } else if (t === "Mi Perfil") {
            filtered = filtered.filter(row => row[13] && String(row[13]).toLowerCase().trim() === nick);
          } else if (t === "Mis Clientes") {
            // Usamos la lista de clientes pre-filtrada del agente
            filtered = clientesAgente.value.filter(row => {
              // 3. Aplicar barra de búsqueda opcional
              const busqueda = window.AppStore.filtroBusquedaCliente.value.toLowerCase().trim();
              if (busqueda.length > 0) {
                const searchStr = `${row[1] || ''} ${row[2] || ''} ${row[3] || ''} ${row[5] || ''}`.toLowerCase();
                return searchStr.includes(busqueda);
              }
              return true; // Si no hay búsqueda, mostrar toda la cartera del agente
            });
          }

          // Paso C: INTERCEPCIÓN CRONOLÓGICA (Solo Historial)
          if (t === "Mi Historial") {
            const fechaIniStr = window.AppStore.filtroFechaInicio.value;
            const fechaFinStr = window.AppStore.filtroFechaFin.value;

            if (fechaIniStr || fechaFinStr) {
              const msInicio = fechaIniStr ? new Date(fechaIniStr + "T00:00:00").getTime() : 0;
              const msFin = fechaFinStr ? new Date(fechaFinStr + "T23:59:59").getTime() : Infinity;

              filtered = filtered.filter(row => {
                const colFecha = 3; // Col D para OATC

                const msTarjeta = parseDateRobust(row[colFecha]);
                
                if (isNaN(msTarjeta)) return false;
                return (msTarjeta >= msInicio && msTarjeta <= msFin);

          if (t === "Mi Historial") return filtered.sort((a,b) => parseDateRobust(b[3]) - parseDateRobust(a[3]));
          if (t === "Mi Agenda") return filtered.sort((a,b) => parseDateRobust(a[1]) - parseDateRobust(b[1])); // Próximas primero

        // 5.0 Lista de Agentes de la Sede (Para Módulo 4 del Jefe Operativo)
        const listaAgentesSede = Vue.computed(() => {

          const sedeActual = window.AppStore.agente.value.sede;
          const nombres = new Set();
          
          m.forEach(row => {
            if (String(row[4] || '') === sedeActual) {
               const rol = String(row[11] || '').toLowerCase().trim();
               if (rol !== 'jefe operativo' && rol !== 'administracion' && row[1]) {
                 nombres.add(String(row[1]).trim());
               }

          });
          return Array.from(nombres).sort();

        // 5.1 Planilla Administrativa (Horario Semanal de todos los administradores)
        const planillaAdministrativa = Vue.computed(() => {
          const m = window.AppStore.cacheDatos.value["Agentes"] || [];
          const sedeActual = window.AppStore.agente.value.sede;
          const miNombre = String(window.AppStore.agente.value.nombre).trim();
          
          const formatHora = (isoStr) => {
            if (!isoStr || !isoStr.includes('T')) return isoStr || '--:--';
            try {
              const d = new Date(isoStr);
              let h = d.getHours();
              let min = d.getMinutes().toString().padStart(2, '0');
              const ampm = h >= 12 ? 'pm' : 'am';
              h = h % 12;
              h = h ? h : 12;
              return h + ':' + min + ' ' + ampm;
            } catch (e) {
              return '--:--';
            }
          };

          let planilla = [];
          
          // Omitir cabecera (index 0) si existe
          for (let i = 1; i < m.length; i++) {
            const row = m[i];
            const sedeAsignada = String(row[4] || '').trim(); // Col E
            const rol = String(row[11] || '').toLowerCase().trim(); // Col L
            const estado = String(row[10] || '').toLowerCase().trim(); // Col K
            
            // Administracion u otros roles de staff
            if (sedeAsignada === sedeActual && estado === 'activo' && 
                ['administración', 'administracion', 'recepción', 'recepcion'].includes(rol)) {
              
              const nombre = String(row[2] || '').trim(); // Col C
              const nick = String(row[13] || '').trim(); // Col N
              if (!nombre) continue;

              planilla.push({
                nombre: nombre,
                nick: nick || nombre.split(' ')[0],
                esYo: nombre === miNombre,
                rol: String(row[11] || '').trim(),
                entrada: formatHora(row[5]), // Col F
                salida: formatHora(row[6]), // Col G
                diaDescanso: String(row[7] || '').trim() // Col H
              });
            }
          }
          
          // Ordenar: yo primero, luego alfabéticamente
          planilla.sort((a, b) => {
            if (a.esYo && !b.esYo) return -1;
            if (!a.esYo && b.esYo) return 1;
            return a.nombre.localeCompare(b.nombre);
          });
          
          return planilla;
        });

        // 5.2 Cálculo de Métricas e Indicadores
        const metricasAgente = Vue.computed(() => {
          const especialidad = window.AppStore.agente.value.especialidad;
          const esJefe = (especialidad === 'Jefe Operativo');
          const agenteSeleccionado = window.AppStore.agenteSeleccionadoSede.value; // 'Todos' o Nombre de agente
          
          let nick = window.AppStore.agente.value.nickname.toLowerCase().trim();
          let nombreCompleto = window.AppStore.agente.value.nombre.toLowerCase().trim();
          
          const msInicio = parseDateRobust(window.AppStore.filtroFechaInicio.value);
          const msFin = parseDateRobust(window.AppStore.filtroFechaFin.value) + 86399999; // Hasta el final del día
          
          const metricas = {
            totalAtenciones: 0,
            porTipo: {}, // Ej: Cliente, Turno, Asesoría
            clientesRegistradosUnicos: 0
          };
          
          // Helper para saber si contamos el registro
          const debeContarRegistro = (asignadoRaw) => {
             if (!esJefe) return esMiRegistro(asignadoRaw, nick, nombreCompleto);

            metricas.totalAtenciones++;
            
            const tipoOriginal = String(row[18] || '').trim(); // Col S
            const tipoLower = tipoOriginal.toLowerCase();
            const resolucionLower = String(row[20] || '').toLowerCase().trim(); // Col U (Hora Resol.)
            
            let bucket = 'Otras Atenciones';
            if (tipoLower.includes('asesoría') && resolucionLower.includes('cancelado')) {
               bucket = 'Asesorías Canceladas';
            } else if (tipoLower.includes('cliente')) {
               bucket = 'Atenciones a Clientes';
            } else if (tipoLower.includes('turno')) {
               bucket = 'Atenciones a Turnos';
            } else if (tipoOriginal) {
               bucket = tipoOriginal; 
            }
            
            metricas.porTipo[bucket] = (metricas.porTipo[bucket] || 0) + 1;
          });

          // 1.5 Filtrar OATC para Atenciones Históricas
          const oatc = window.AppStore.cacheDatos.value["OATC"] || [];
          oatc.forEach(row => {
            const fechaRow = parseDateRobust(row[3] || row[0]); // Col D (Fecha) o Col A (Hora)
            if (isNaN(fechaRow) || fechaRow < msInicio || fechaRow > msFin) return;
            
            const asignado = row[6]; // Col G (Agente OATC)
            if (!debeContarRegistro(asignado)) return;
            
            metricas.totalAtenciones++;
            
            const tipoOriginal = String(row[2] || '').trim(); // Col C (Tipo)
            const tipoLower = tipoOriginal.toLowerCase();
            const resolucionLower = String(row[7] || '').toLowerCase().trim(); // Col H (Resolución)
            
            let bucket = 'Otras Atenciones';
            if (tipoLower.includes('asesoría') && resolucionLower.includes('cancelado')) {
               bucket = 'Asesorías Canceladas';
            } else if (tipoLower.includes('cliente')) {
               bucket = 'Atenciones a Clientes';
            } else if (tipoLower.includes('turno')) {
               bucket = 'Atenciones a Turnos';
            } else if (tipoOriginal) {
               bucket = tipoOriginal; 
            }
            
            metricas.porTipo[bucket] = (metricas.porTipo[bucket] || 0) + 1;
          });
          
          // 2. Contar Clientes Únicos Registrados
          if (esJefe && agenteSeleccionado === 'Todos') {
             // Si ve 'Todos', ve a todos los clientes de la base global
             const baseClientes = window.AppStore.cacheDatos.value["Clientes"] || [];
             metricas.clientesRegistradosUnicos = baseClientes.length;
          } else {
             // Aproximación rápida para el agente individual
             metricas.clientesRegistradosUnicos = clientesAgente.value.length;
          }
          
          return metricas;
        });

        // 5.2 Módulo 3: Comportamiento de Demanda (Sede)
        const metricasDemanda = Vue.computed(() => {
          const oatc = window.AppStore.cacheDatos.value["OATC"] || [];
          const msInicio = parseDateRobust(window.AppStore.filtroFechaInicio.value);
          const msFin = parseDateRobust(window.AppStore.filtroFechaFin.value) + 86399999;
          
          const demanda = {
             totalAtenciones: 0,
             cancelaciones: 0,
             diaMasFuerte: '',
             maxAfluencia: 0,
             franjasAfluencia: {}
          };
          
          const cuentaDias = {};
          
          oatc.forEach(row => {
            const fechaRow = parseDateRobust(row[3] || row[0]); // Col D (Fecha) o Col A (Hora)
            if (isNaN(fechaRow) || fechaRow < msInicio || fechaRow > msFin) return;
            
            demanda.totalAtenciones++;
            
            // Detectar Cancelaciones
            const resolucion = String(row[7] || '').toLowerCase().trim();
            if (resolucion.includes('cancelado') || resolucion.includes('cancelada')) {
               demanda.cancelaciones++;
            }
            
            // Conteo por Día de la semana
            const objFecha = new Date(fechaRow);
            const diaSemana = objFecha.toLocaleDateString('es-ES', { weekday: 'long' });
            cuentaDias[diaSemana] = (cuentaDias[diaSemana] || 0) + 1;
            
            // Conteo por franja horaria (bloques de 1 hora)
            const hora = objFecha.getHours();
            const ampm = hora >= 12 ? 'PM' : 'AM';
            const horaVisual = `${hora % 12 || 12} ${ampm}`;
            demanda.franjasAfluencia[horaVisual] = (demanda.franjasAfluencia[horaVisual] || 0) + 1;
          });
          
          // Calcular Día más Fuerte
          let maxDiaVal = 0;
          for (let d in cuentaDias) {
             if (cuentaDias[d] > maxDiaVal) {
                maxDiaVal = cuentaDias[d];
                demanda.diaMasFuerte = d;
             }
          }
          
          // Calcular Franjas Afluencia (ordenarlas)
          // Convertimos las llaves a un array y ordenamos por hora 24h
          const parseHoraToNum = (hStr) => {
             const [h, ampm] = hStr.split(' ');
             let num = parseInt(h);
             if (ampm === 'PM' && num < 12) num += 12;
             if (ampm === 'AM' && num === 12) num = 0;
             return num;
          };
          
          const ordenadas = {};
          const keys = Object.keys(demanda.franjasAfluencia).sort((a,b) => parseHoraToNum(a) - parseHoraToNum(b));
          keys.forEach(k => {
             ordenadas[k] = demanda.franjasAfluencia[k];
             if (demanda.franjasAfluencia[k] > demanda.maxAfluencia) {
                demanda.maxAfluencia = demanda.franjasAfluencia[k];
             }
          });
          demanda.franjasAfluencia = ordenadas;
          
          return demanda;
        });

        // 6. Estado del Turno (Cálculo de Posición en la Cola desde Borrador)
        const estadoTurnoAgente = Vue.computed(() => {
          const m = window.AppStore.cacheDatos.value["Borrador"] || [];
          if (m.length === 0) return { posicion: 0, total: 0, cola: [] };
          
          const nick = window.AppStore.agente.value.nickname.toLowerCase().trim();
          const nombreCompleto = window.AppStore.agente.value.nombre.toLowerCase().trim();
          
          const filtro = window.AppStore.filtroCola.value;
          
          // Filtrar agentes en la Sede (Col B tiene el nombre, Col I tiene el estado)
          let agentesCola = m.filter(row => {
            const dependiente = String(row[1] || '').trim(); // Col B
            const estadoFisico = String(row[8] || '').toLowerCase().trim(); // Col I
            const especialidad = String(row[10] || '').toLowerCase().trim(); // Col K
            
            if (dependiente.length === 0 || estadoFisico !== 'disponible' || especialidad === 'administracion' || especialidad === 'jefe operativo') return false;
            
            if (filtro !== 'Todos' && especialidad !== filtro.toLowerCase()) return false;
            
            return true;
          });
          
          // Ordenar por Col M (Ult Act) ascendente (el más antiguo primero)
          agentesCola.sort((a, b) => {
             const timeA = parseDateRobust(a[12]) || 0;
             const timeB = parseDateRobust(b[12]) || 0;
             return timeA - timeB;
          });
          
          const totalCola = agentesCola.length;
          let posicion = 0;
          for(let i = 0; i < totalCola; i++) {
             if (esMiRegistro(agentesCola[i][1], nick, nombreCompleto)) {
                posicion = i + 1;
                break;
             }
          }
          
          // Buscar el estado real del agente en el borrador (primera coincidencia)
          let estadoActual = 'Desconocido';
          for (let row of m) {
            if (esMiRegistro(row[1], nick, nombreCompleto)) {
              if (row[8]) { // Col I (Estado)
                 estadoActual = String(row[8]).trim();
              }
              break; 
            }
          }
          
          const cola = agentesCola.map(a => ({ nombre: a[1], especialidad: String(a[10] || 'Técnico') })); // Retornar array de objetos
          return { posicion, total: totalCola, estadoActual, cola };
        });

        // 6.5. Mando Operativo: Atenciones en Curso Globales
        const atencionesActivasSede = Vue.computed(() => {
          const m = window.AppStore.cacheDatos.value["Borrador"] || [];
          if (m.length === 0) return [];
          
          return m.filter(row => {
            if (!row[13]) return false; // Debe ser OATC (tener hora de orden en Col N)
            
            const resolucion = String(row[20] || '').toLowerCase().trim(); // Col U (Hora Resol.)
            if (resolucion.includes('cancelado') || resolucion.includes('terminado') || resolucion.match(/\d{1,2}:\d{2}/)) {
               return false;
            }
            return true;
          }).sort((a, b) => parseDateRobust(a[13]) - parseDateRobust(b[13])); // Más antiguos primero
        });

        // 7. Agenda Agrupada (Clasificación temporal para Mi Agenda)
        const agendaAgrupada = Vue.computed(() => {
          const citas = obtenerDatosVisualizables.value;
          if (AppStore.pestanaActiva.value !== 'Mi Agenda' || !citas || citas.length === 0) {
            return { pasadas: [], hoy: [], futuras: [] };
          }

          const hoy = new Date();
          hoy.setHours(0, 0, 0, 0); // Normalizar a medianoche local
          const msHoy = hoy.getTime();
          const msManana = msHoy + 86400000;

          const pasadas = [];
          const citasHoy = [];
          const futuras = [];

          citas.forEach(cita => {
            const msCita = parseDateRobust(cita[1]); // Col B = Fecha Cita
            if (isNaN(msCita)) {
              pasadas.push(cita); // Fallback
            } else if (msCita < msHoy) {
              pasadas.push(cita);
            } else if (msCita >= msHoy && msCita < msManana) {
              citasHoy.push(cita);
            } else {
              futuras.push(cita);
            }
          });

          // Ordenamiento interno: Futuras y Hoy ascienden (próximas primero), pasadas descienden (más recientes primero)
          pasadas.sort((a,b) => parseDateRobust(b[1]) - parseDateRobust(a[1]));
          citasHoy.sort((a,b) => parseDateRobust(a[1]) - parseDateRobust(b[1]));
          futuras.sort((a,b) => parseDateRobust(a[1]) - parseDateRobust(b[1]));

          return { pasadas, hoy: citasHoy, futuras };
        });

        // =========================================================================

        // =========================================================================
        const accionModalAtencion = (tipo) => {

          const clienteActual = card[17] || 'Anónimo'; // Columna R en Borrador

              titulo: card[18] === 'Cita' ? 'Cancelar Cita' : 'Cancelar Atención',

            });
          } else if (tipo === 'editar') {
            mostrarDialogo({
              tipo: 'prompt',

              inputPlaceholder: 'Nombre Apellido | DNI | Celular',
              botonAuxiliar: 'Seleccionar de Mis Clientes',
              mostrarSelectorClientes: false,
              onBotonAuxiliar: () => {
                // Al hacer clic, cargamos la hoja de clientes y OATC si no están, y mostramos el selector
                window.AppStore.dialogo.value.mostrarSelectorClientes = !window.AppStore.dialogo.value.mostrarSelectorClientes;
                if (window.AppStore.dialogo.value.mostrarSelectorClientes) {
                   if (!window.AppStore.cacheDatos.value['Clientes'] || window.AppStore.cacheDatos.value['Clientes'].length === 0) {
                      solicitarMatrizAlServidor('Clientes');
                   }
                   if (!window.AppStore.cacheDatos.value['OATC'] || window.AppStore.cacheDatos.value['OATC'].length === 0) {
                      solicitarMatrizAlServidor('OATC');
                   }
                }
              },
              onConfirm: (nuevoNombre) => {
                if (nuevoNombre && nuevoNombre.trim() !== '') {
                  // Escribir directamente a GAS
                  window.AppStore.cargando.value = true;
                  google.script.run
                    .withSuccessHandler((res) => {
                      window.AppStore.cargando.value = false;
                      if(res.exito) {
                         mostrarToast(`Nombre actualizado a: ${nuevoNombre.trim()}`, 'success');
                         forzarRefrescoDatos(); // Refrescamos la vista para ver el cambio
                      } else {
                         mostrarToast('⚠️ Error: ' + res.mensaje, 'error');
                      }
                    })
                    .withFailureHandler((err) => {
                      window.AppStore.cargando.value = false;
                      mostrarToast('⚠️ Fallo de red: ' + err.message, 'error');
                    })
                    .actualizarNombreAtencionBorrador(window.AppStore.agente.value.sede, idTurno, nuevoNombre.trim());
                  
                  cerrarModalDetalles();
                }
              }
            });
          } else if (tipo === 'insumos') {
            mostrarModalFormulario({
              titulo: 'Solicitar Insumos',
              textoBoton: 'Enviar Solicitud',
              campos: [
                { id: 'insumo', label: 'Insumo Requerido', tipo: 'text' },
                { id: 'cantidad', label: 'Cantidad', tipo: 'number' }
              ],
              onSubmit: (data) => {
                dispararAlertaBotonera(`Insumo: ${data.cantidad}x ${data.insumo} (Ref: ${idTurno})`);
                mostrarToast('Solicitud de insumos enviada', 'success');
              }
            });
          } else if (tipo === 'historialAtenciones') {
            const nombreCompleto = `${String(card[1] || '')} ${String(card[2] || '')}`.trim();
            const cadenaCliente = `${String(card[1] || '')}${String(card[2] || '')}${String(card[3] || '')}${String(card[5] || '')}`.toLowerCase().replace(/\s+/g, '');
            
            const historialOatc = window.AppStore.cacheDatos.value["OATC"] || [];
            const registrosCliente = [];
            
            historialOatc.forEach(row => {
               let encontrado = false;
               [row[3], row[4]].forEach(celda => {
                 if (!encontrado && celda && String(celda).includes('|')) {
                    const cadenaEstricta = String(celda).toLowerCase().replace(/[\s|]+/g, '');
                    if (cadenaEstricta.length > 0 && cadenaEstricta === cadenaCliente) {
                       encontrado = true;
                    }
                 }
               });
               if (encontrado) {
                  // OATC: colA (hora) = row[0], colC (tipo/servicio) = row[2], colD (fecha) = row[3] (wait, row[3] es Cliente en D, la fecha es row[1] o row[0]?)
                  // Let's assume colA = row[0], colC = row[2], colD = row[3]. 
                  // Wait, earlier I saw row[3] is col D and has the pipe string "LUCY X | | 987754978"
                  // I should just push the whole row to the modal and let the UI parse it!
                  registrosCliente.push({
                     hora: row[0], // Col A
                     idTurno: row[1], // Col B
                     tipo: row[2], // Col C
                     fecha: row[3] && !String(row[3]).includes('|') ? row[3] : (row[0] || 'N/A'), // Fallback if D is Cliente
                     clienteRaw1: row[3], // Col D
                     clienteRaw2: row[4], // Col E
                     agente: row[6] // Col G
                  });
               }
            });
            
            window.AppStore.modalHistorialAtenciones.value = {
              visible: true,
              clienteNombre: nombreCompleto,
              registros: registrosCliente.reverse() // Reverse to show latest first (assuming chronological)
            };
          } else if (tipo === 'editarClienteHist') {
            cerrarModalDetalles();
            const nombreAntiguo = `${String(card[1] || '')} ${String(card[2] || '')}`.trim();
            mostrarModalFormulario({
              titulo: 'Editar Perfil del Cliente',
              textoBoton: 'Guardar y Sincronizar Historial',
              campos: [
                { id: 'nombre', label: 'Nombres', tipo: 'text', valor: card[1] },
                { id: 'apellido', label: 'Apellidos', tipo: 'text', valor: card[2] },
                { id: 'dni', label: 'DNI', tipo: 'text', valor: card[3] },
                { id: 'cumpleanos', label: 'Cumpleaños', tipo: 'text', valor: card[4] ? formatearFechaUHoraVisual(card[4], false) : '' },
                { id: 'celular', label: 'Celular', tipo: 'text', valor: card[5] },
                { id: 'correo', label: 'Correo', tipo: 'text', valor: card[6] }
              ],
              onSubmit: (data) => {
                mostrarToast('🔄 Sincronizando historial en segundo plano...', 'info');
                google.script.run
                  .withSuccessHandler(res => {
                    if(res.exito){
                      mostrarToast('✅ ' + res.mensaje, 'success');
                      forzarRefrescoDatos();
                    } else {
                      mostrarToast('⚠️ Error: ' + res.mensaje, 'error');
                    }
                  })
                  .withFailureHandler(err => {
                    mostrarToast('⚠️ Error: ' + err.message, 'error');
                  })
                  .editarClienteYSincronizar(window.AppStore.agente.value.sede, nombreAntiguo, data);
              }
            });
          } else if (tipo === 'ficha') {
            mostrarModalFormulario({
              titulo: 'Abrir Ficha Clínica',
              textoBoton: 'Abrir',
              campos: [
                { id: 'motivo', label: 'Motivo de Consulta', tipo: 'text' },
                { id: 'observaciones', label: 'Observaciones Iniciales', tipo: 'text' }
              ],
              onSubmit: (data) => {
                mostrarToast('Ficha guardada (Simulación)', 'success');
              }
            });
          }
        };

        // Función para Grilla de Calendario (Slots por hora)
        const isStaffActiveInHour = (staff, hIndex, diaStr) => {
           if (!staff || !staff.entrada || staff.entrada === '--:--') return false;
           if (staff.diaDescanso && staff.diaDescanso.toLowerCase() === diaStr.toLowerCase()) return false;
           
           const parseHours = (str) => {
              const match = str.match(/(\d+):(\d+)\s*(am|pm)/i);
              if (!match) return 0;
              let h = parseInt(match[1], 10);
              const m = parseInt(match[2], 10);
              const isPm = match[3].toLowerCase() === 'pm';
              if (isPm && h !== 12) h += 12;
              if (!isPm && h === 12) h = 0;
              return h + m/60;
           };
           
           const shiftStart = parseHours(staff.entrada);
           let shiftEnd = parseHours(staff.salida);
           if (shiftEnd <= shiftStart) shiftEnd += 24;
           
           // hIndex goes from 1 to 15. hIndex 1 is 8:00 AM.
           const slotStart = hIndex + 7;
           const slotEnd = slotStart + 1;
           
           return shiftStart < slotEnd && shiftEnd > slotStart;
        };

        return {
          // Estado Global existente
          AppStore: window.AppStore,
          estadoTurnoAgente,
          atencionesActivasSede, // <-- Exportado aquí
          planillaAdministrativa, // <-- Exportado aquí
          agendaAgrupada,
          listaAgentesSede,
          metricasDemanda,

          // Funciones de navegación y autenticación existentes
          cambiarPestana,
          cargarMasResultados,
          dispararAlertaBotonera,
          cargarNicknamesSede,
          ejecutarLogin,
          // Manejo de Sesión
          cerrarSesion,
          iniciarEdicionPerfil,
          guardarPerfil,
          forzarRefrescoDatos,
          limpiarFiltroFechas,
          
          alternarModalCola: () => { window.AppStore.modalCola.value = !window.AppStore.modalCola.value; },
          cerrarModalHistorial: () => { window.AppStore.modalHistorialAtenciones.value.visible = false; },
          setFiltroCola: (f) => { window.AppStore.filtroCola.value = f; },
          mostrarToast,
          alternarTema,
          aplicarTemaAlHTML,
          abrirModalDetalles,
          cerrarModalDetalles,
          
          mostrarDialogo,
          cerrarDialogo,
          confirmarDialogo,
          
          mostrarModalFormulario,
          cerrarModalFormulario,
          enviarModalFormulario,
          
          alternarMenuBurbujas: () => { window.AppStore.mostrarMenuBurbujas.value = !window.AppStore.mostrarMenuBurbujas.value; },
          seleccionarClienteDialogo,
          accionModalAtencion,
          
          // Formateadores y utilitarios existentes
          formatearFechaUHoraVisual,
          obtenerClaseEstadoCSS,
          obtenerEncabezadosTabla,
          clientesAgente,
          metricasAgente,
          obtenerDatosVisualizables,

          // =========================================================================
          // NUEVOS CONTROLADORES DE LA BOTONERA Y SECCIÓN BAR (INJECTADOS)
          // =========================================================================
          modificarCantidadBar,        // Función para sumar/restar cantidades de bebida
          esFinDeSemanaEfectivo,      // Propiedad computada que valida si es Viernes o Sábado
          tieneItemsParaEnviar,       // Propiedad computada que muestra/oculta el botón de envío
          enviarPedidoBarConsolidado,  // Función que procesa el string final y limpia el estado
          
          isStaffActiveInHour
        };
      }
    });

    app.mount('#app');
  })();
</script>
